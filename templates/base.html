<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TIPS Ladder{% endblock %}</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'home' %}" class="nav-brand">After-Tax TIPS Ladder Calculator</a>
            <div class="nav-links">
                <a href="{% url 'home' %}" class="nav-link">TIPS Data</a>
                <a href="{% url 'data_entry' %}" class="nav-link">Build Ladder</a>
                <a href="{% url 'ladder_display' %}" class="nav-link">View Results</a>
                <a href="{% url 'clear_ladder' %}" class="nav-link" style="color: var(--danger);"
                   onclick="return confirm('Are you sure you want to clear all ladder data?');">Clear Ladder Data</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer">
        <a href="#" id="howToLink" class="how-to-link">How to Use this App</a>
        <p>&copy; 2026 After-Tax TIPS Ladder Web App v2.1</p>
    </footer>

    <!-- How-To Modal -->
    <div id="howToModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="howToContent" class="markdown-body">Loading...</div>
        </div>
    </div>

    {% block extra_js %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('howToModal');
            const link = document.getElementById('howToLink');
            const closeBtn = document.querySelector('.close-modal');
            const content = document.getElementById('howToContent');

            if (link && modal && closeBtn) {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    modal.style.display = 'block';
                    
                    fetch('{% static "how-to.md" %}')
                        .then(response => {
                            if (!response.ok) {
                                throw new Error('Network response was not ok');
                            }
                            return response.text();
                        })
                        .then(text => {
                            content.innerHTML = marked.parse(text);
                        })
                        .catch(err => {
                            content.innerHTML = '<p>Error loading how-to content.</p>';
                            console.error(err);
                        });
                });

                closeBtn.addEventListener('click', () => {
                    modal.style.display = 'none';
                });

                window.addEventListener('click', (e) => {
                    if (e.target == modal) {
                        modal.style.display = 'none';
                    }
                });
            }
        });
    </script>
</body>

</html>
