<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TIPS Ladder{% endblock %}</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'home' %}" class="nav-brand">After-Tax TIPS Ladder Calculator</a>
            <div class="nav-links">
                <a href="{% url 'home' %}" class="nav-link">TIPS Data</a>
                <a href="{% url 'data_entry' %}" class="nav-link">Build Ladder</a>
                <a href="{% url 'ladder_display' %}" class="nav-link">View Results</a>
                <a href="{% url 'clear_ladder' %}" class="nav-link" style="color: var(--danger);"
                   onclick="return confirm('Are you sure you want to clear all ladder data?');">Clear Ladder Data</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2026 After-Tax TIPS Ladder Web App</p>
    </footer>

    {% block extra_js %}
    {% endblock %}
</body>

</html>
